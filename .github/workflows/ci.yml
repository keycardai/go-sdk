name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-commits:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install commitizen
        run: pip install commitizen
      - name: Validate commit messages
        run: |
          BASE_SHA=$(git merge-base origin/main HEAD)
          cz check --rev-range "${BASE_SHA}..HEAD"

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - run: go vet ./...
      - run: go test -race -count=1 ./...
      - run: go build ./examples/...

  # MCP framework examples live in their own modules (with a replace directive
  # to the root) so the root module stays free of MCP framework dependencies.
  # Their tests integration-test the SDK against each framework, including
  # AuthInfo freshness across token rotation within one MCP session.
  test-examples:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example: [mcp-server-official, mcp-server-mark3labs]
    defaults:
      run:
        working-directory: examples/${{ matrix.example }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: examples/${{ matrix.example }}/go.mod
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -count=1 ./...
